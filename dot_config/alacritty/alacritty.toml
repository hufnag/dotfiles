[general]
live_config_reload = true

[window]
decorations = "buttonless"
dynamic_padding = false
startup_mode = "Windowed"
# opacity = 0.90
option_as_alt = "OnlyLeft"

# [terminal.shell]
# program = "/bin/zsh"
# args = ["-l", "-c", "zellij attach -c Default"]

[env]
TERM = "xterm-256color"

[scrolling]
history = 50000
multiplier = 1

[font]
size = 12.0
normal = { family = "Hack Nerd Font Mono", style = "Regular" }

[colors]
draw_bold_text_with_bright_colors = true

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[cursor]
# unfocused_hollow = true

[keyboard]
bindings = [
  { action = "ResetFontSize", key = "0", mods = "Command" },
  { action = "IncreaseFontSize", key = "Plus", mods = "Command" },
  { action = "DecreaseFontSize", key = "Minus", mods = "Command" },
  { action = "Paste", key = "V", mods = "Command" },
  { action = "Copy", key = "C", mods = "Command" },
  { action = "Paste", key = "V", mods = "Control" },
  { key = "V", mods = "Command | Shift", action = "ToggleViMode" },
]

[mouse]
hide_when_typing = true


[colors.bright]
black = "0x928374"
blue = "0x83a598"
cyan = "0x8ec07c"
green = "0xb8bb26"
magenta = "0xd3869b"
red = "0xfb4934"
